<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKSSB Real-Time Mock Test</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .test-container { max-width: 700px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 20px; }
        .timer { font-size: 18px; font-weight: bold; color: #dc3545; background: #fff5f5; padding: 5px 10px; border-radius: 4px; border: 1px solid #dc3545; }
        .question-card { margin-bottom: 25px; padding: 15px; border: 1px solid #e2e8f0; border-radius: 6px; }
        .question-text { font-size: 16px; font-weight: bold; margin-bottom: 12px; color: #2d3748; }
        .options-list { list-style: none; padding: 0; }
        .option-item { margin: 8px 0; padding: 10px; border: 1px solid #cbd5e0; border-radius: 4px; cursor: pointer; display: flex; align-items: center; }
        .option-item:hover { background-color: #f7fafc; }
        .option-item input { margin-right: 10px; }
        .submit-btn { width: 100%; padding: 12px; background: #007bff; color: white; border: none; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .submit-btn:hover { background: #0056b3; }
        .hidden { display: none; }
        
        /* Results Section Styling */
        .results-card { background: #fff; padding: 20px; border-radius: 8px; border-top: 5px solid #28a745; text-align: center; }
        .score-metric { font-size: 32px; font-weight: bold; color: #28a745; margin: 15px 0; }
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .stat-box { background: #f8f9fa; padding: 10px; border-radius: 4px; border: 1px solid #e2e8f0; }
        .stat-val { font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>

<div class="test-container">
    <!-- Active Quiz Screen -->
    <div id="quiz-screen">
        <div class="header">
            <h2>JKSSB General Mock Test</h2>
            <div class="timer" id="time-display">Time Left: 05:00</div>
        </div>
        <div id="questions-wrapper"></div>
        <button class="submit-btn" onclick="submitExam()">Submit Test</button>
    </div>

    <!-- Live Results Publication Screen -->
    <div id="result-screen" class="hidden">
        <div class="results-card">
            <h2>Exam Performance Summary</h2>
            <p>Your calculated final score according to JKSSB rules (+1 Correct, -0.25 Wrong):</p>
            <div class="score-metric" id="final-score">0.00 / 4.00</div>
            
            <div class="stats-grid">
                <div class="stat-box" style="border-bottom: 3px solid #28a745;">
                    <div class="stat-val" style="color: #28a745;" id="stat-correct">0</div>
                    <div>Correct</div>
                </div>
                <div class="stat-box" style="border-bottom: 3px solid #dc3545;">
                    <div class="stat-val" style="color: #dc3545;" id="stat-wrong">0</div>
                    <div>Incorrect</div>
                </div>
                <div class="stat-box" style="border-bottom: 3px solid #6c757d;">
                    <div class="stat-val" style="color: #6c757d;" id="stat-skipped">0</div>
                    <div>Unattempted</div>
                </div>
            </div>
            <br>
            <button class="submit-btn" style="background:#6c757d;" onclick="location.reload()">Retake Exam</button>
        </div>
    </div>
</div>

<script>
// Mock data question bank setup
const examQuestions = [
    { id: 1, q: "Who was the last ruling Maharaja of Jammu and Kashmir?", options: ["Hari Singh", "Gulab Singh", "Ranbir Singh", "Pratap Singh"], correct: 0 },
    { id: 2, q: "Which river is popularly known as the 'Sorrow of Kashmir'?", options: ["Chenab", "Jhelum", "Ravi", "Tawi"], correct: 1 },
    { id: 3, q: "The treaty of Amritsar was signed in which year?", options: ["1846", "1857", "1925", "1947"], correct: 0 },
    { id: 4, q: "Which lake is famous for its floating gardens (Radh) in J&K?", options: ["Wular Lake", "Mansar Lake", "Dal Lake", "Anchar Lake"], correct: 2 }
];

let totalSecondsLeft = 300; // 5 Minutes for practice exam simulation
let timerInterval = null;

function loadQuestions() {
    const wrapper = document.getElementById("questions-wrapper");
    wrapper.innerHTML = examQuestions.map((item, index) => `
        <div class="question-card">
            <div class="question-text">Q${index + 1}. ${item.q}</div>
            <ul class="options-list">
                ${item.options.map((opt, optIdx) => `
                    <label class="option-item">
                        <input type="radio" name="q-${item.id}" value="${optIdx}">
                        <span>${opt}</span>
                    </label>
                `).join('')}
            </ul>
        </div>
    `).join('');
}

function startTimer() {
    timerInterval = setInterval(() => {
        if (totalSecondsLeft <= 0) {
            clearInterval(timerInterval);
            submitExam(); // Auto-submit when countdown hits zero
            return;
        }
        totalSecondsLeft--;
        let minutes = Math.floor(totalSecondsLeft / 60);
        let seconds = totalSecondsLeft % 60;
        document.getElementById("time-display").innerText = 
            `Time Left: ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    }, 1000);
}

function submitExam() {
    clearInterval(timerInterval);
    let correctCount = 0;
    let wrongCount = 0;
    let skippedCount = 0;

    examQuestions.forEach(item => {
        const selector = document.querySelector(`input[name="q-${item.id}"]:checked`);
        if (!selector) {
            skippedCount++;
        } else if (parseInt(selector.value) === item.correct) {
            correctCount++;
        } else {
            wrongCount++;
        }
    });

    // Exact official JKSSB marking engine scheme calculation (+1 / -0.25)
    let finalCalculatedScore = (correctCount * 1.0) - (wrongCount * 0.25);

    // Render results panels live
    document.getElementById("quiz-screen").classList.add("hidden");
    document.getElementById("result-screen").classList.remove("hidden");
    
    document.getElementById("final-score").innerText = `${finalCalculatedScore.toFixed(2)} / ${examQuestions.length}.00`;
    document.getElementById("stat-correct").innerText = correctCount;
    document.getElementById("stat-wrong").innerText = wrongCount;
    document.getElementById("stat-skipped").innerText = skippedCount;
}

// Initial script activation runtime triggers
window.onload = () => {
    loadQuestions();
    startTimer();
};
</script>
</body>
</html>
