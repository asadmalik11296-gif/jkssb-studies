<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKSSB Studies - AI Gateway Login</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #090d16; color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-container { background-color: #0f172a; border: 1px solid #1e293b; padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { font-size: 24px; color: #38bdf8; margin-bottom: 8px; text-align: center; }
        p { color: #94a3b8; font-size: 14px; text-align: center; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; font-weight: 500; }
        input { width: 100%; background: #090d16; border: 1px solid #334155; border-radius: 8px; padding: 12px; color: white; font-size: 14px; outline: none; }
        input:focus { border-color: #38bdf8; }
        button { background: #38bdf8; color: #0f172a; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; font-size: 15px; }
        button:hover { background: #0ea5e9; }
        .toggle-link { text-align: center; margin-top: 20px; font-size: 13px; color: #94a3b8; }
        .toggle-link span { color: #38bdf8; cursor: pointer; font-weight: 600; text-decoration: underline; }
    </style>
    <!-- 💻 GOOGLE ADSENSE CODE INTEGRATION -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6086620349531765"
     crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-6086620349531765">
</head>
<body>

    <div class="auth-container">
        <h2 id="auth-title">Login to JKSSB Studies</h2>
        <p id="auth-subtitle">Access your AI exam preparation workspace</p>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="student@example.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <!-- आईडी असाइन की ताकि जावास्क्रिप्ट सीधे क्लिक पकड़ सके -->
        <button id="auth-btn">Sign In</button>
        
        <div class="toggle-link" id="toggle-area">
            Don't have an account? <span id="switch-toggle-btn">Create Account</span>
        </div>
    </div>

    <!-- 🔥 FIREBASE MODULES WITH ROBUST EVENT LISTENERS -->
    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://gstatic.com";
        import { getFirestore, doc, setDoc } from "https://gstatic.com";

        const firebaseConfig = {
            apiKey: "AIzaSyBIYbXqDcnVz0ptRYiByS2EmvCHNMLK9QA",
            authDomain: "://firebaseapp.com",
            projectId: "jkssb-studies-ai",
            storageBucket: "jkssb-studies-ai.firebasestorage.app",
            messagingSenderId: "73749425646",
            appId: "1:73749425646:web:878fa8036f6b5b2db4b2ff",
            measurementId: "G-3TCXTCDST5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let isSignUpMode = false;

        // 🔄 क्लिक्स को बिना किसी एरर के संभालने के लिए मुख्य फंक्शन
        function toggleFormMode() {
            isSignUpMode = !isSignUpMode;
            
            document.getElementById('auth-title').innerText = isSignUpMode ? "Create Account" : "Login to JKSSB Studies";
            document.getElementById('auth-subtitle').innerText = isSignUpMode ? "Sign up to start learning with AI" : "Access your AI exam preparation workspace";
            document.getElementById('auth-btn').innerText = isSignUpMode ? "Sign Up" : "Sign In";
            
            const toggleArea = document.getElementById('toggle-area');
            if (isSignUpMode) {
                toggleArea.innerHTML = `Already have an account? <span id="switch-toggle-btn">Sign In</span>`;
            } else {
                toggleArea.innerHTML = `Don't have an account? <span id="switch-toggle-btn">Create Account</span>`;
            }
            
            // नया बटन रेंडर होने के बाद उस पर दोबारा लिसनर लगाना ज़रूरी है
            document.getElementById('switch-toggle-btn').addEventListener('click', toggleFormMode);
        }

        // मुख्य सबमिशन लॉजिक (लॉगिन / साइन-अप)
        async function handleAuthSubmission() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if(!email || !password) { alert("Please fill all fields."); return; }

            try {
                if (isSignUpMode) {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    
                    await setDoc(doc(db, "users", user.uid), {
                        email: email,
                        plan: "free",
                        createdAt: new Date().toISOString()
                    });
                    
                    alert("Account created successfully!");
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
                
                window.location.href = "dashboard.html";
                
            } catch (error) {
                alert("Error: " + error.message);
            }
        }

        // ⚡ मॉडर्न गिटहब/फायरबेस इवेंट बाइंडिंग (100% वर्किंग गारंटी)
        document.getElementById('switch-toggle-btn').addEventListener('click', toggleFormMode);
        document.getElementById('auth-btn').addEventListener('click', handleAuthSubmission);
    </script>
</body>
</html>
