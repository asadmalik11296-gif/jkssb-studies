<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKSSB Mock Test Panel</title>
    
    <!-- 🖥️ GOOGLE ADSENSE CODE INTEGRATION -->
    <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-6086620349531765">

    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 15px; }
        .test-container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .hub-title { text-align: center; color: #007bff; margin-bottom: 25px; }
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .topic-card { background: #fff; border: 1px solid #cbd5e0; padding: 20px; border-radius: 6px; text-align: center; cursor: pointer; transition: 0.2s; }
        .topic-card:hover { border-color: #007bff; box-shadow: 0 4px 12px rgba(0,123,255,0.15); }
        .btn-start { margin-top: 12px; padding: 8px 20px; background: #007bff; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        /* Quiz Layout */
        .quiz-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 20px; }
        .timer-box { font-size: 18px; font-weight: bold; color: #dc2626; background: #fee2e2; padding: 5px 12px; border-radius: 4px; }
        .quiz-body { display: flex; gap: 20px; flex-wrap: wrap; }
        .question-area { flex: 2; min-width: 280px; }
        .question-text { font-size: 18px; font-weight: bold; margin-bottom: 15px; line-height: 1.4; }
        .options-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .option-btn { padding: 12px 15px; text-align: left; border: 1px solid #cbd5e0; border-radius: 5px; background: white; font-size: 15px; cursor: pointer; transition: 0.2s; }
        .option-btn:hover { background-color: #f8f9fa; }
        .option-btn.selected { background-color: #eff6ff; border-color: #007bff; font-weight: bold; }
        
        /* Sidebar Palette */
        .sidebar { flex: 1; min-width: 200px; background: #f8f9fa; padding: 15px; border-radius: 6px; border: 1px solid #cbd5e0; display: flex; flex-direction: column; justify-content: space-between; max-height: 320px; }
        .palette-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 15px; }
        .palette-cell { height: 35px; display: flex; align-items: center; justify-content: center; border: 1px solid #cbd5e0; border-radius: 4px; cursor: pointer; background: #e2e8f0; font-size: 14px; font-weight: 500; }
        .palette-cell.active { border: 2px solid #007bff; }
        .palette-cell.answered { background: #28a745; color: white; border-color: #28a745; }
        
        .btn-nav { padding: 8px 20px; background: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .btn-next { background: #007bff; }
        .btn-submit { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .result-box { text-align: center; padding: 30px 10px; }
    </style>
</head>
<body>

    <!-- 1. TOPIC SELECTION HUB -->
    <div class="test-container" id="hub-container">
        <h1 class="hub-title">JKSSB Mock Test Panel</h1>
        <div class="grid-layout">
            <div class="topic-card" onclick="startTest()">
                <h3>Aptitude Practice Set</h3>
                <p style="color: #666; margin: 5px 0;">10 Questions | 10 Minutes</p>
                <p><small style="color: #888;">LCM-HCF, Time-Work, Ratio, Percentage</small></p>
                <button class="btn-start">Start Test</button>
            </div>
        </div>
    </div>

    <!-- 2. LIVE QUIZ INTERFACE -->
    <div class="test-container" id="quiz-container" style="display: none;">
        <div class="quiz-header">
            <h2 style="color: #007bff; margin: 0;">Live Test</h2>
            <div id="timer" class="timer-box">Time Left: 10:00</div>
        </div>

        <div class="quiz-body">
            <!-- Left Side -->
            <div class="question-area">
                <div id="question-text" class="question-text">Loading...</div>
                <div id="options-container" class="options-list"></div>
                <div style="display: flex; justify-content: space-between;">
                    <button id="prev-btn" class="btn-nav" onclick="changeQuestion(-1)">Previous</button>
                    <button id="next-btn" class="btn-nav btn-next" onclick="changeQuestion(1)">Next</button>
                </div>
            </div>

            <!-- Right Side (Sidebar) -->
            <div class="sidebar">
                <div>
                    <h4 style="margin: 0 0 10px 0; color: #4a5568;">Question Palette</h4>
                    <div id="palette-container" class="palette-grid"></div>
                </div>
                <button class="btn-submit" onclick="submitQuiz()">Submit Test</button>
            </div>
        </div>
    </div>

    <!-- 3. RESULT VIEW -->
    <div class="test-container" id="result-container" style="display: none;">
        <div class="result-box">
            <h2 style="color: #28a745; margin-bottom: 15px;">Test Completed!</h2>
            <div id="score-text" style="font-size: 20px; line-height: 1.6; margin-bottom: 20px;"></div>
            <button onclick="location.reload()" class="btn-nav btn-next" style="padding: 10px 25px;">Go Back to Hub</button>
        </div>
    </div>

    <script>
        // 10 Mixed Questions (LCM-HCF, Time-Work, Ratio, Percentage)
        const questions = [
            { "id": "pc_1", "q": "Find the highest common factor (HCF) of 42, 63, and 140.", "options": ["7", "14", "21", "28"], "correct_answer": "7" },
            { "id": "pc_2", "q": "If A's salary is 25% more than B's salary, then by what percentage is B's salary less than A's salary?", "options": ["15%", "20%", "25%", "30%"], "correct_answer": "20%" },
            { "id": "pc_3", "q": "A and B can do a piece of work in 12 days, B and C in 15 days, and C and A in 20 days. In how many days can A, B and C together complete the work?", "options": ["8 days", "10 days", "12 days", "6 days"], "correct_answer": "10 days" },
            { "id": "pc_4", "q": "If A:B = 2:3 and B:C = 4:5, find the ratio A:B:C.", "options": ["2:3:5", "8:12:15", "6:9:15", "8:10:15"], "correct_answer": "8:12:15" },
            { "id": "pc_5", "q": "The LCM of two numbers is 4800 and their HCF is 160. If one number is 480, find the other number.", "options": ["1600", "1200", "1800", "2400"], "correct_answer": "1600" },
            { "id": "pc_6", "q": "Due to a reduction of 20% in the price of sugar, a man can buy 5 kg more sugar for ₹600. Find the reduced price per kg.", "options": ["₹24", "₹30", "₹36", "₹20"], "correct_answer": "₹24" },
            { "id": "pc_7", "q": "A can do a work in 15 days and B in 20 days. If they work on it together for 4 days, then the fraction of the work that is left is:", "options": ["1/4", "1/10", "7/15", "8/15"], "correct_answer": "8/15" },
            { "id": "pc_8", "q": "Two numbers are in the ratio 3:5. If 9 is subtracted from each, the new ratio becomes 12:23. Find the larger number.", "options": ["27", "33", "49", "55"], "correct_answer": "55" },
            { "id": "pc_9", "q": "Find the least number which when divided by 12, 15, 20 and 54 leaves a remainder of 4 in each case.", "options": ["540", "544", "536", "548"], "correct_answer": "544" },
            { "id": "pc_10", "q": "If the price of petrol is increased by 20%, by what percentage must a driver reduce his consumption so that expenditure remains same?", "options": ["16.67%", "20%", "25%", "18.5%"], "correct_answer": "16.67%" }
        ];

        let currentIndex = 0;
        let userAnswers = {};
        let timeLeft = 10 * 60; // Strictly 10 Minutes
        let timerInterval;

        function startTest() {
            document.getElementById('hub-container').style.display = 'none';
            document.getElementById('quiz-container').style.display = 'block';
            renderQuestion();
            renderPalette();
            startTimer();
        }

        function renderQuestion() {
            const currentQ = questions[currentIndex];
            document.getElementById('question-text').innerText = `Q${currentIndex + 1}: ${currentQ.q}`;
            
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            currentQ.options.forEach(option => {
                const button = document.createElement('button');
                button.className = 'option-btn';
                if (userAnswers[currentIndex] === option) button.classList.add('selected');
                button.innerText = option;
                button.onclick = () => selectOption(option);
                optionsContainer.appendChild(button);
            });

            document.getElementById('prev-btn').disabled = currentIndex === 0;
        }

        function selectOption(option) {
            userAnswers[currentIndex] = option;
            renderQuestion();
            renderPalette();
        }

        function changeQuestion(direction) {
            currentIndex += direction;
            if (currentIndex < 0) currentIndex = 0;
            if (currentIndex >= questions.length) currentIndex = questions.length - 1;
            renderQuestion();
            updatePaletteActive();
        }

        function renderPalette() {
    const palette = document.getElementById('palette-container');
    palette.innerHTML = '';
    questions.forEach((_, index) => {
        const cell = document.createElement('div');
        cell.className = 'palette-cell';
        if (index === currentIndex) cell.classList.add('active');
        if (userAnswers[index] !== undefined) cell.classList.add('answered');
        cell.innerText = index + 1;
        cell.onclick = () => { currentIndex = index; renderQuestion(); updatePaletteActive(); };
        palette.appendChild(cell);
    });
}

function updatePaletteActive() {
    const cells = document.getElementById('palette-container').children;
    for(let i=0; i<cells.length; i++) {
        cells[i].classList.remove('active');
        if (i === currentIndex) cells[i].classList.add('active');
    }
}

// 10 minutes live timer
function startTimer() {
    const timerEl = document.getElementById('timer');
    timerInterval = setInterval(() => {
        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;
        timerEl.innerText = `Time Left: ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            submitQuiz(true);
        }
        timeLeft--;
    }, 1000);
}

// Test submission with fully compatible leaderboard data sync
function submitQuiz(isAuto = false) {
    if(!isAuto && !confirm("क्या आप सच में टेस्ट सबमिट करना चाहते हैं?")) return;
    clearInterval(timerInterval);
    
    let correct = 0;
    let wrong = 0;

    questions.forEach((q, index) => {
        if (userAnswers[index] !== undefined) {
            if (userAnswers[index] === q.correct_answer) correct++;
            else wrong++;
        }
    });

    let finalScore = correct - (wrong * 0.25);

    document.getElementById('quiz-container').style.display = 'none';
    document.getElementById('result-container').style.display = 'block';
    
    document.getElementById('score-text').innerHTML = `
        <p style="font-size: 24px; font-weight: bold; color: #007bff; margin-bottom: 10px;">Final Score: ${finalScore.toFixed(2)} / ${questions.length}</p>
        <p style="color: #28a745; font-weight: bold; margin: 5px 0;">Correct Answers: ${correct}</p>
        <p style="color: #dc2626; font-weight: bold; margin: 5px 0;">Wrong Answers: ${wrong}</p>
    `;

    // 🏆 LEADERSBOARD ENTRY
    setTimeout(() => {
        let userName = prompt("लीडरबोर्ड में अपना नाम दर्ज करने के लिए अपना नाम लिखें:");
        if (!userName) userName = "Anonymous User";

        let leaderboard = JSON.parse(localStorage.getItem('jkssb_leaderboard')) || [];
        
        // यहाँ टेबल स्ट्रक्चर के हिसाब से 'name', 'score' और 'test' तीनों जा रहे हैं
        leaderboard.push({ 
            name: userName, 
            score: parseFloat(finalScore.toFixed(2)),
            test: "Aptitude Practice Set" 
        });
        
        leaderboard.sort((a, b) => b.score - a.score);
        localStorage.setItem('jkssb_leaderboard', JSON.stringify(leaderboard));
        
        // यदि आप चाहते हैं कि सबमिट होने के बाद यूजर सीधे लीडरबोर्ड पेज पर चला जाए:
        // window.location.href = "leaderboard.html"; 
    }, 1000);
}
</script>
</body>
</html>
