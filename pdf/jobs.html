<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Job Advertisements - JKSSB Studies</title>
    
<!-- 💻 GOOGLE ADSENSE CODE INTEGRATION -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6086620349531765"
     crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-6086620349531765">

    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 20px; }
        .job-list { list-style: none; padding: 0; margin: 0; }
        .job-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #ddd; }
        .job-item:last-child { border-bottom: none; }
        .job-title { font-size: 16px; font-weight: bold; color: #333; display: block; margin-bottom: 5px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; display: inline-block; }
        .gov { background-color: #d4edda; color: #155724; }
        .private { background-color: #fff3cd; color: #856404; }
        .btn-download { background-color: #007bff; color: white; padding: 8px 12px; text-decoration: none; border-radius: 4px; font-size: 14px; font-weight: bold; white-space: nowrap; }
        .btn-download:hover { background-color: #0056b3; }
        
        /* Ad Containers Styling */
        .adsense-box { text-align: center; margin: 20px 0; padding: 10px; background-color: #fafafa; border: 1px dashed #bbb; min-height: 90px; }
        .ads-label { display: block; font-size: 10px; color: #aaa; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📋 Latest Job Advertisements (Govt & Private)</h2>

    <!-- 📢 ADSENSE PLACE 1: Top Responsive Banner -->
    <div class="adsense-box">
        <span class="ads-label">Advertisement</span>
        <!-- अपना AdSense Banner Code इसके नीचे पेस्ट करें -->
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
             data-ad-slot="YYYYYYYYYY"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>
    </div>

    <ul class="job-list">
        
        <!-- जॉब 1 -->
        <li class="job-item">
            <div>
                <span class="job-title">JKSSB New Notification</span>
                <span class="badge gov">Government</span>
            </div>
            <a href="PDF/jkssb-job.pdf" target="_blank" class="btn-download">📥 Download PDF</a>
        </li>

        <!-- जॉब 2 -->
        <li class="job-item">
            <div>
                <span class="job-title">Private Company Recruitment</span>
                <span class="badge private">Private</span>
            </div>
            <a href="PDF/private-job.pdf" target="_blank" class="btn-download">📥 Download PDF</a>
        </li>

        <!-- 📢 ADSENSE PLACE 2: In-Feed Ad (जॉब लिस्ट के बीच में) -->
        <div class="adsense-box">
            <span class="ads-label">Advertisement</span>
            <!-- अपना AdSense In-Feed/Multiplex Ad Code इसके नीचे पेस्ट करें -->
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-format="fluid"
                 data-ad-layout-key="-fb+5w+4e-db+86"
                 data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
                 data-ad-slot="ZZZZZZZZZZ"></ins>
            <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>
        </div>

        <!-- जॉब 3 -->
        <li class="job-item">
            <div>
                <span class="job-title">JKPSC New Vacancy</span>
                <span class="badge gov">Government</span>
            </div>
            <a href="PDF/jkpsc-job.pdf" target="_blank" class="btn-download">📥 Download PDF</a>
        </li>

    </ul>

    <!-- 📢 ADSENSE PLACE 3: Bottom Ad (पेज के अंत में) -->
    <div class="adsense-box">
        <span class="ads-label">Advertisement</span>
        <!-- अपना AdSense Bottom Banner Code इसके नीचे पेस्ट करें -->
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
             data-ad-slot="WWWWWWWWWW"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>
    </div>

</div>

</body>
</html>
