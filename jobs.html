<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Job Advertisements - JKSSB Studies</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #333; text-align: center; border-bottom: 2px solid #007bff; padding-bottom: 10px; margin-bottom: 20px; }
        .job-list { list-style: none; padding: 0; margin: 0; }
        .job-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #ddd; }
        .job-item:last-child { border-bottom: none; }
        .job-title { font-size: 16px; font-weight: bold; color: #333; display: block; margin-bottom: 5px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: bold; text-transform: uppercase; display: inline-block; }
        .gov { background-color: #d4edda; color: #155724; }
        .private { background-color: #fff3cd; color: #856404; }
        .btn-download { background-color: #007bff; color: white; padding: 8px 12px; text-decoration: none; border-radius: 4px; font-size: 14px; font-weight: bold; white-space: nowrap; }
        .btn-download:hover { background-color: #0056b3; }
        .btn-apply { background-color: #28a745; color: white; } /* अप्लाई/लिंक के लिए हरा बटन */
        .btn-apply:hover { background-color: #218838; }
        
        /* होमपेज बटन */
        .home-btn-container { text-align: center; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .btn-home { background-color: #6c757d; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; font-weight: bold; display: inline-block; }
        .btn-home:hover { background-color: #5a6268; }
    </style>
  <!-- 💻 GOOGLE ADSENSE CODE INTEGRATION -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6086620349531765"
     crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-6086620349531765">
</head>
<body>

<div class="container">
    <h2>📋 Latest Job Advertisements (Govt & Private)</h2>

    <ul class="job-list">
        
        <!-- उदाहरण 1: सरकारी जॉब (जब आप अपने pdf फोल्डर में जॉब की PDF डालेंगे) -->
        <li class="job-item">
            <div>
                <span class="job-title">JKSSB & JKPSC Job Notification</span>
                <span class="badge gov">Government</span>
            </div>
            <!-- ⚠️ 'pdf/' के आगे अपनी सरकारी नौकरी की PDF फाइल का असली नाम लिखें -->
            <a href="pdf/Advt_07OF2026_08072026.pdf" target="_blank" class="btn-download">📥 Download PDF</a>
        </li>

        <!-- उदाहरण 2: प्राइवेट जॉब (जब आप प्राइवेट जॉब की PDF डाउनलोड करवाना चाहें) -->
        <li class="job-item">
            <div>
                <span class="job-title">IDBI BANK Hiring 2026</span>
                <span class="badge private">Private</span>
            </div>
            <!-- ⚠️ 'pdf/' के आगे अपनी प्राइवेट नौकरी की PDF फाइल का असली नाम लिखें -->
            <a href="pdf/idbi-short-notice.pdf" target="_blank" class="btn-download">📥 Download PDF</a>
        </li>

        <!-- उदाहरण 3: प्राइवेट जॉब (जब आप डायरेक्ट अप्लाई करने का लिंक देना चाहें) -->
        <li class="job-item">
            <div>
                <span class="job-title">Reliance Digital Store Manager Recruitment</span>
                <span class="badge private">Private</span>
            </div>
            <!-- ⚠️ यहाँ href के अंदर सीधे उस कंपनी की वेबसाइट का अप्लाई लिंक पेस्ट कर दें -->
            <a href="https://jio.com" target="_blank" class="btn-download btn-apply">🌐 Apply Online</a>
        </li>

    </ul>

    <!-- होमपेज पर वापस जाने का बटन -->
    <div class="home-btn-container">
        <a href="index.html" class="btn-home">⬅️ Back to Homepage</a>
    </div>
</div>

</body>
</html>
