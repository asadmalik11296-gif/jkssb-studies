<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKSSB Studies - Create Account</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #090d16; color: #f8fafc; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-container { background-color: #0f172a; border: 1px solid #1e293b; padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        h2 { font-size: 24px; color: #38bdf8; margin-bottom: 8px; text-align: center; }
        p { color: #94a3b8; font-size: 14px; text-align: center; margin-bottom: 24px; }
        .input-group { margin-bottom: 16px; }
        label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; font-weight: 500; }
        input { width: 100%; background: #090d16; border: 1px solid #334155; border-radius: 8px; padding: 12px; color: white; font-size: 14px; outline: none; }
        input:focus { border-color: #38bdf8; }
        button { background: #38bdf8; color: #0f172a; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; font-size: 15px; }
        button:hover { background: #0ea5e9; }
        .toggle-link { text-align: center; margin-top: 20px; font-size: 13px; color: #94a3b8; }
        .toggle-link a { color: #38bdf8; cursor: pointer; font-weight: 600; text-decoration: underline; }
    </style>
  <!-- 💻 GOOGLE ADSENSE CODE INTEGRATION -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6086620349531765"
     crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-6086620349531765">
</head>
<body>

    <div class="auth-container">
        <h2>Create Account</h2>
        <p>Sign up to start learning with AI</p>
        
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="student@example.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button id="signup-btn">Sign Up</button>
        
        <div class="toggle-link">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>

    <!-- 🔥 100% FIXED FIREBASE MODULES FOR SIGNUP.HTML -->
    <script type="module">
    <!-- ⚡ CORS AND CACHE FIX: FIREBASE STANDALONE SCRIPTS -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <script>
        // ✅ आपकी बिल्कुल असली फ़ायरबेस चाबियाँ
        const firebaseConfig = {
            apiKey: "AIzaSyBIYbXqDcnVz0ptRYiByS2EmvCHNMLK9QA",
            authDomain: "://firebaseapp.com",
            projectId: "jkssb-studies-ai",
            storageBucket: "jkssb-studies-ai.firebasestorage.app",
            messagingSenderId: "73749425646",
            appId: "1:73749425646:web:878fa8036f6b5b2db4b2ff",
            measurementId: "G-3TCXTCDST5"
        };

        // फायरबेस को इनिशियलाइज़ करना
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // बटन पर क्लिक सुनते ही काम शुरू करना
        document.getElementById('signup-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if(!email || !password) { 
                alert("Please fill all fields."); 
                return; 
            }
            
            if(password.length < 6) {
                alert("Password must be at least 6 characters long.");
                return;
            }

            try {
                // 1. नया फ़ायरबेस अकाउंट बनाना
                const userCredential = await auth.createUserWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                // 2. डेटाबेस में नया रिकॉर्ड बनाना (डिफ़ॉल्ट प्लान: free)
                await db.collection("users").doc(user.uid).set({
                    email: email,
                    plan: "free",
                    createdAt: new Date().toISOString()
                });
                
                alert("Account created successfully!");
                
                // 3. सीधे डैशबोर्ड पर भेज देना
                window.location.href = "dashboard.html";
                
            } catch (error) {
                alert("Error: " + error.message);
            }
        });
    </script>
</body>
</html>
