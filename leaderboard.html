<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JKSSB Mock Test Leaderboard</title>
    
    <script async src="https://googlesyndication.com" crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-6086620349531765">

    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .leaderboard-container { max-width: 650px; margin: 0 auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #007bff; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #6c757d; font-size: 14px; margin-bottom: 25px; }
        .rank-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .rank-table th { background-color: #007bff; color: white; padding: 12px; text-align: left; font-size: 15px; }
        .rank-table td { padding: 12px; border-bottom: 1px solid #e2e8f0; font-size: 15px; color: #2d3748; }
        .rank-badge { display: inline-block; width: 24px; height: 24px; line-height: 24px; text-align: center; border-radius: 50%; font-weight: bold; font-size: 13px; }
        .rank-1 { background-color: #ffd700; color: #000; }
        .rank-2 { background-color: #c0c0c0; color: #000; }
        .rank-3 { background-color: #cd7f32; color: white; }
        .score-val { font-weight: bold; color: #28a745; text-align: right; }
        .test-tag { font-size: 11px; color: #718096; background: #edf2f7; padding: 2px 6px; border-radius: 4px; display: block; margin-top: 4px; width: max-content; }
        .loading { text-align: center; color: #a0aec0; padding: 30px; font-style: italic; font-size: 16px; }
    </style>
</head>
<body>

<div class="leaderboard-container">
    <h2>🏆 JKSSB Exam Hall of Fame</h2>
    <div class="subtitle">Your Top 10 Performance Rankings</div>

    <div id="loading-view" class="loading">No scores recorded yet. Take a test to see rankings!</div>

    <table class="rank-table" id="leaderboard-table" style="display:none;">
        <thead>
            <tr>
                <th style="width: 15%;">Rank</th>
                <th style="width: 55%;">Student Profile Details</th>
                <th style="width: 30%; text-align: right;">Final Score</th>
            </tr>
        </thead>
        <tbody id="leaderboard-rows"></tbody>
    </table>
</div>

<script>
function fetchAndRenderLeaderboard() {
    try {
        // लोकल स्टोरेज से सुरक्षित डेटा निकालना
        let rawEntries = JSON.parse(localStorage.getItem('jkssb_leaderboard')) || [];
        
        if (rawEntries.length === 0) {
            document.getElementById("loading-view").style.display = "block";
            document.getElementById("leaderboard-table").style.display = "none";
            return;
        }

        document.getElementById("loading-view").style.display = "none";
        const tableElement = document.getElementById("leaderboard-table");
        const container = document.getElementById("leaderboard-rows");

        // स्कोर के आधार पर सबसे ज़्यादा से सबसे कम (Highest to Lowest) सॉर्ट करना
        rawEntries.sort((a, b) => b.score - a.score);
        
        // केवल टॉप 10 रैंक दिखाना
        const topTen = rawEntries.slice(0, 10);

        container.innerHTML = topTen.map((student, index) => {
            const rank = index + 1;
            let badgeClass = "rank-badge";
            if (rank <= 3) badgeClass += ` rank-${rank}`;

            return `
                <tr>
                    <td><span class="${badgeClass}">${rank}</span></td>
                    <td>
                        <span style="font-weight: 600; color: #1a202c;">${student.name}</span>
                        <span class="test-tag">📝 ${student.test}</span>
                    </td>
                    <td class="score-val">${student.score.toFixed(2)}</td>
                </tr>
            `;
        }).join('');

        tableElement.style.display = "table";
    } catch (error) {
        console.error(error);
    }
}

window.onload = fetchAndRenderLeaderboard;
</script>
</body>
</html>
